name: Validate research outputs

on:
  workflow_dispatch:
  schedule:
    # Monthly refresh/validation on the first day of each month.
    - cron: '37 2 1 * *'
  push:
    paths:
      - 'index.html'
      - 'research-extras.json'
      - '.github/workflows/validate-research.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate research extras JSON
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path
          from urllib.parse import urlparse

          path = Path('research-extras.json')
          payload = json.loads(path.read_text(encoding='utf-8'))
          outputs = payload.get('outputs')
          if not isinstance(outputs, list):
              raise SystemExit('research-extras.json must contain an outputs list')

          required = ['title', 'source', 'year', 'date', 'category', 'topic', 'description', 'url', 'button_text']
          link_required_words = re.compile(r'\b(read|listen|view|watch|open|download)\b', re.I)
          allowed_unlinked = {'details pending', 'link pending', 'not publicly available', 'unavailable'}

          seen = set()
          for i, item in enumerate(outputs, start=1):
              missing = [field for field in required if field not in item]
              if missing:
                  raise SystemExit(f'Output {i} is missing: {missing}')
              title = str(item.get('title', '')).strip()
              if not title:
                  raise SystemExit(f'Output {i} has an empty title')
              duplicate_key = (title.lower(), str(item.get('source', '')).strip().lower())
              if duplicate_key in seen:
                  raise SystemExit(f'Duplicate research extra detected: {title}')
              seen.add(duplicate_key)
              button = str(item.get('button_text', '')).strip()
              url = str(item.get('url', '')).strip()
              if url:
                  parsed = urlparse(url)
                  if parsed.scheme not in {'http', 'https'} or not parsed.netloc:
                      raise SystemExit(f'Output {i} ({title}) has an invalid URL: {url}')
                  if 'utm_source=chatgpt.com' in url.lower():
                      raise SystemExit(f'Output {i} ({title}) still contains a ChatGPT tracking parameter')
              else:
                  if link_required_words.search(button):
                      raise SystemExit(f'Output {i} ({title}) has button_text "{button}" but no URL')
                  if button.lower() not in allowed_unlinked:
                      raise SystemExit(f'Output {i} ({title}) has unsupported disabled button text: {button}')

          print(f'Validated {len(outputs)} research extras.')
          PY

      - name: Validate external publication feed is reachable
        run: |
          python - <<'PY'
          import json
          from urllib.request import urlopen

          url = 'https://dvandenhoek13.github.io/tsi-publications/publications.json'
          with urlopen(url, timeout=30) as response:
              payload = json.loads(response.read().decode('utf-8'))
          publications = payload.get('publications')
          if not isinstance(publications, list) or not publications:
              raise SystemExit('External TSI publication feed did not return a non-empty publications list')
          print(f'External publication feed reachable with {len(publications)} publications.')
          PY
